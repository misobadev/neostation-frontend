app-id: com.neogamelab.neostation
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: neostation

finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --device=dri
  - --socket=pulseaudio
  - --share=network
  - --filesystem=home
  - --talk-name=org.freedesktop.secrets

cleanup:
  - /include
  - /lib/pkgconfig
  - '*.la'
  - '*.a'

modules:
  - name: neostation
    buildsystem: simple
    build-commands:
      - mkdir -p /app/bin /app/data
      - cp -r neostation-bundle/* /app/bin/
      - chmod +x /app/bin/neostation
      - install -Dm644 com.neogamelab.neostation.desktop /app/share/applications/com.neogamelab.neostation.desktop
      - install -Dm644 com.neogamelab.neostation.metainfo.xml /app/share/metainfo/com.neogamelab.neostation.metainfo.xml
      - |
        for size in 64 128 256; do
          mkdir -p /app/share/icons/hicolor/${size}x${size}/apps
          cp assets/images/logo.png /app/share/icons/hicolor/${size}x${size}/apps/com.neogamelab.neostation.png
        done
    sources:
      - type: dir
        path: ../../build/linux/x64/release/bundle
        dest: neostation-bundle
      - type: file
        path: com.neogamelab.neostation.desktop
      - type: file
        path: com.neogamelab.neostation.metainfo.xml
      - type: file
        path: ../../assets/images/logo.png
        dest: assets/images

name: Flatpak Build (Validate)

on:
  push:
    branches: [ main ]
    paths:
      - 'linux/flatpak/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - 'lib/**'
      - 'linux/**'
      - 'packages/**'
      - '.github/workflows/flatpak-build.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'linux/flatpak/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - 'lib/**'
      - 'linux/**'
      - 'packages/**'
  workflow_dispatch:

jobs:
  flatpak:
    name: Build Flatpak
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Flatpak and builder
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder appstream desktop-file-utils

      - name: Add Flathub remote
        run: |
          flatpak remote-add --user --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo

      - name: Install GNOME SDK
        run: |
          flatpak install --user -y --noninteractive flathub org.gnome.Sdk//50
          flatpak install --user -y --noninteractive flathub org.gnome.Platform//50

      - name: Update Flutter SHA256
        run: |
          bash linux/flatpak/get-flutter-sha256.sh

      - name: Validate metainfo
        continue-on-error: true
        run: |
          appstreamcli validate --explain \
            linux/flatpak/com.neogamelab.neostation.metainfo.xml

      - name: Validate desktop file
        run: |
          desktop-file-validate linux/flatpak/com.neogamelab.neostation.desktop

      - name: Build Flatpak
        run: |
          flatpak-builder --user --repo=repo --force-clean \
            build-dir linux/flatpak/com.neogamelab.neostation.yml

      - name: Export Flatpak bundle
        run: |
          flatpak build-bundle repo neostation.flatpak com.neogamelab.neostation

      - name: Upload Flatpak artifact
        uses: actions/upload-artifact@v7
        with:
          name: neostation-flatpak
          path: neostation.flatpak
          if-no-files-found: error

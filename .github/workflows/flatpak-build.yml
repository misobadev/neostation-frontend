name: Flatpak Build (Validate)

on:
  push:
    branches: [ main ]
    paths:
      - 'linux/flatpak/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - 'lib/**'
      - 'linux/**'
      - 'packages/**'
      - '.github/workflows/flatpak-build.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'linux/flatpak/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - 'lib/**'
      - 'linux/**'
      - 'packages/**'
  workflow_dispatch:

jobs:
  flatpak:
    name: Build Flatpak
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Flutter Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libsqlite3-dev libsecret-1-dev \
            libjsoncpp-dev libasound2-dev libpulse-dev libopus-dev \
            libvorbis-dev libflac-dev libogg-dev

      - name: Create .env from secrets
        shell: bash
        env:
          RA_API_KEY: ${{ secrets.RA_API_KEY }}
          SCREENSCRAPER_DEV_ID: ${{ secrets.SCREENSCRAPER_DEV_ID }}
          SCREENSCRAPER_DEV_PASSWORD: ${{ secrets.SCREENSCRAPER_DEV_PASSWORD }}
        run: |
          : > .env
          MISSING=0
          if [ -n "$RA_API_KEY" ]; then
            echo "RA_API_KEY=$RA_API_KEY" >> .env
            echo "  RA_API_KEY: set"
          else
            echo "::warning::RA_API_KEY secret is not set — RetroAchievements will fail"
            MISSING=1
          fi
          if [ -n "$SCREENSCRAPER_DEV_ID" ]; then
            echo "SCREENSCRAPER_DEV_ID=$SCREENSCRAPER_DEV_ID" >> .env
            echo "  SCREENSCRAPER_DEV_ID: set"
          else
            echo "::warning::SCREENSCRAPER_DEV_ID secret is not set — ScreenScraper will fail"
            MISSING=1
          fi
          if [ -n "$SCREENSCRAPER_DEV_PASSWORD" ]; then
            echo "SCREENSCRAPER_DEV_PASSWORD=$SCREENSCRAPER_DEV_PASSWORD" >> .env
            echo "  SCREENSCRAPER_DEV_PASSWORD: set"
          else
            echo "::warning::SCREENSCRAPER_DEV_PASSWORD secret is not set — ScreenScraper will fail"
            MISSING=1
          fi
          if [ "$MISSING" -eq 1 ]; then
            echo "::warning::Some secrets are missing. Check Settings > Secrets and variables > Actions > Secrets."
            echo "::warning::If secrets are under an Environment, ensure the job has 'environment:' matching that name."
          fi
          echo ".env created with $(wc -l < .env) lines"

      - name: Build Flutter Linux app
        run: |
          flutter pub get
          flutter build linux --release --dart-define-from-file=.env

      - name: Install Flatpak tools
        run: |
          sudo add-apt-repository -y ppa:flatpak/stable
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder appstream desktop-file-utils

      - name: Add Flathub remote
        run: |
          flatpak remote-add --user --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo

      - name: Install GNOME SDK
        run: |
          flatpak install --user -y --noninteractive flathub org.gnome.Sdk//50
          flatpak install --user -y --noninteractive flathub org.gnome.Platform//50

      - name: Validate metainfo
        continue-on-error: true
        run: |
          appstreamcli validate --explain \
            linux/flatpak/com.neogamelab.neostation.metainfo.xml

      - name: Validate desktop file
        run: |
          desktop-file-validate linux/flatpak/com.neogamelab.neostation.desktop

      - name: Build Flatpak
        run: |
          flatpak-builder --user --repo=repo --force-clean \
            build-dir linux/flatpak/com.neogamelab.neostation.yml

      - name: Export Flatpak bundle
        run: |
          flatpak build-bundle repo neostation.flatpak com.neogamelab.neostation

      - name: Upload Flatpak artifact
        uses: actions/upload-artifact@v7
        with:
          name: neostation-flatpak
          path: neostation.flatpak
          if-no-files-found: error
